name: Actualizar Radar de Noticias

on:
  schedule:
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar update-news.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node update-news.js

      - name: Commit y push de news.json
        run: |
          git config --global user.name  "Execon Radar Bot"
          git config --global user.email "bot@execon.com.ar"
          git add news.json seen-urls.json
          git diff --staged --quiet || git commit -m "🗞️ Actualización $(date +'%Y-%m-%d')"
          git push
